<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Kids Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #00a2ff; --bg: #f0f4f8; --ai: #6c5ce7; --s: #2ecc71; --red: #ff4757; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); touch-action: manipulation; user-select: none; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        
        .btn { padding: 18px; border-radius: 22px; border: none; font-weight: 900; cursor: pointer; width: 100%; margin: 8px 0; font-size: 17px; color: white; text-transform: uppercase; transition: 0.2s; position: relative; }
        .btn-p { background: var(--p); box-shadow: 0 6px 0 #0081cc; }
        .btn-ai { background: var(--ai); box-shadow: 0 6px 0 #5649c0; }
        .btn-s { background: var(--s); box-shadow: 0 6px 0 #219150; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 25px; text-align: center; border: 2px solid #e2e8f0; cursor: pointer; }

        #stage { background: white; border-radius: 35px; height: 380px; position: relative; border: 6px solid var(--p); overflow: hidden; margin-bottom: 15px; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        #player { width: 45px; height: 45px; background: var(--ai); position: absolute; border-radius: 12px; border: 3px solid white; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .target { width: 95px; height: 110px; background: #8d6e63; border-radius: 35px 35px 10px 10px; position: absolute; bottom: -130px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 13px; font-weight: bold; border: 3px solid #5d4037; padding: 8px; box-sizing: border-box; }
        .target.up { bottom: 25px; }

        #joy { width: 110px; height: 110px; background: rgba(0,0,0,0.08); border-radius: 50%; margin: 10px auto; position: relative; border: 2px dashed #ccc; display: none; }
        #stick { width: 50px; height: 50px; background: var(--ai); border-radius: 50%; position: absolute; left: 30px; top: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        #q-text { font-size: 22px; font-weight: 900; color: #2d3436; text-align: center; margin-bottom: 10px; min-height: 35px; }
        
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fly { from { left: 110%; } to { left: -180px; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--ai); font-size: 22px;">GRAMMA PRO</div>
    <div id="score-val" style="font-weight:900; font-size: 20px;">0 ⭐</div>
    <button onclick="location.reload()" style="background:none; border:none; font-size:28px; cursor:pointer;">🏠</button>
</header>

<div id="sc-menu" class="screen active">
    <div class="grid" id="menu-box"></div>
    <button class="btn btn-s" style="margin-top:20px;" onclick="importGame()">📥 ЗАГРУЗИТЬ КОД</button>
</div>

<div id="sc-edit" class="screen">
    <div class="card" style="margin-bottom:10px; cursor:default;">
        <b style="color:var(--ai)">🤖 ИИ ТЕМЫ (13):</b>
        <div id="ai-topics" class="grid" style="margin-top:10px; grid-template-columns: repeat(3, 1fr); gap:6px;"></div>
    </div>
    <div id="factory"></div>
    <button class="btn" style="background:#636e72" onclick="addQ()">➕ СВОЙ ВОПРОС</button>
    <div class="grid">
        <button class="btn btn-s" onclick="exportCode()">📤 КОПИРОВАТЬ КОД</button>
        <button class="btn btn-p" onclick="startPlay()">ИГРАТЬ ▶️</button>
    </div>
</div>

<div id="sc-game" class="screen">
    <div id="q-text"></div>
    <div id="stage"></div>
    <div id="joy"><div id="stick"></div></div>
    <div id="options" class="grid"></div>
</div>

<script>
    const modes = [
        {id:'maze', n:'Лабиринт', e:'👾'}, {id:'mole', n:'Кроты', e:'🔨'}, 
        {id:'plane', n:'Самолет', e:'✈️'}, {id:'anagram', n:'Слова', e:'🔠'},
        {id:'quiz', n:'Тест', e:'📝'}, {id:'tf', n:'Да/Нет', e:'✔️'}, {id:'sort', n:'Группы', e:'↔️'}
    ];

    const aiData = [
        {t:"Сущ.", q:"3-е склонение:", a:["Мышь", "Дом", "Конь"]},
        {t:"Глагол", q:"Инфинитив:", a:["Петь", "Пою", "Пел"]},
        {t:"Прилаг.", q:"Лишнее слово:", a:["Белый", "Бег", "Яркий"]},
        {t:"Местоим.", q:"Личное:", a:["Я", "Мой", "Твой"]},
        {t:"Наречие", q:"Вопрос 'Как?':", a:["Быстро", "Синий", "Урок"]},
        {t:"Предлог", q:"Найди предлог:", a:["В", "И", "Но"]},
        {t:"Союз", q:"Запятая перед:", a:["Но", "И", "Или"]},
        {t:"Числит.", q:"Порядковое:", a:["Первый", "Один", "Раз"]},
        {t:"Обращ.", q:"Выделяется:", a:["Запятой", "Тире", "Точкой"]},
        {t:"Корень", q:"Главная часть:", a:["Корень", "Суффикс", "Оконч."]},
        {t:"Фонетика", q:"Звук [А]:", a:["Гласный", "Согл.", "Твердый"]},
        {t:"Синтакс.", q:"Подлежащее:", a:["Кто? Что?", "Где?", "Как?"]},
        {t:"Лексика", q:"Синоним 'Умный':", a:["Мудрый", "Умный", "Глупый"]}
    ];

    let mode = '', qs = [], cur = 0, score = 0, px=20, py=20;

    modes.forEach(m => {
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<span>${m.e}</span><b>${m.n}</b>`;
        d.onclick = () => { mode = m.id; show('sc-edit'); initEdit(); };
        document.getElementById('menu-box').appendChild(d);
    });

    function initEdit() {
        const box = document.getElementById('ai-topics'); box.innerHTML = '';
        aiData.forEach(d => {
            const b = document.createElement('button'); b.className = 'btn-ai'; 
            b.style="font-size:10px; padding:8px; border:none; border-radius:12px; color:white; cursor:pointer";
            b.innerText = d.t; b.onclick = () => addQ(d.q, d.a, 0); box.appendChild(b);
        });
    }

    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function addQ(q='', a=['','',''], c=0) {
        const d = document.createElement('div'); d.className = 'card'; d.style='margin-bottom:12px; text-align:left; padding:15px; border-left:8px solid var(--ai)';
        const qId = 'r'+Math.random().toString(36).substr(2,5);
        d.innerHTML = `<input type="text" placeholder="Твой вопрос..." value="${q}" class="qi" style="width:100%; padding:12px; margin-bottom:10px; border-radius:12px; border:2px solid #ddd; box-sizing:border-box; font-size:16px;">
            ${[0,1,2].map(i => `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <input type="radio" name="${qId}" ${i===c?'checked':''} class="ok-check" style="width:20px; height:20px; accent-color:var(--s);">
                <input type="text" placeholder="Ответ ${i+1}" value="${a[i]||''}" class="ai" style="width:100%; padding:10px; border-radius:10px; border:1px solid #eee; box-sizing:border-box;">
            </div>`).join('')}`;
        document.getElementById('factory').appendChild(d);
    }

    function saveQs() {
        qs = [];
        document.querySelectorAll('#factory > .card').forEach(c => {
            const opts = [];
            c.querySelectorAll('div[style*="flex"]').forEach(d => {
                const t = d.querySelector('.ai').value;
                if(t) opts.push({t, ok: d.querySelector('.ok-check').checked});
            });
            if(c.querySelector('.qi').value) qs.push({q: c.querySelector('.qi').value, opts});
        });
    }

    function render() {
        const it = qs[cur]; const st = document.getElementById('stage'); const op = document.getElementById('options');
        st.innerHTML = ""; op.innerHTML = ""; document.getElementById('q-text').innerText = it.q;
        document.getElementById('joy').style.display = (mode==='maze'?'block':'none');

        if(mode === 'maze') {
            st.innerHTML = '<div id="player">👾</div>'; px=20; py=20; updateP();
            it.opts.forEach((o, i) => {
                const t = document.createElement('div'); t.className = 'target up'; t.innerText = o.t;
                t.style.left = (10 + i*33) + '%'; t.style.top = '140px'; t.dataset.ok = o.ok; st.appendChild(t);
            });
            initJoy();
        } 
        else if(mode === 'mole') {
            it.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'target'; m.innerText = o.t;
                m.style.left = (10 + i*33) + '%'; m.onclick = () => check(o.ok, m);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 300+i*200);
            });
        }
        else if(mode === 'plane') {
            it.opts.forEach((o, i) => {
                const p = document.createElement('div'); p.style=`position:absolute; background:white; border:4px solid var(--p); padding:15px; border-radius:20px; left:110%; top:${50+i*110}px; animation: fly ${4+i}s linear infinite; font-weight:900; cursor:pointer; white-space:nowrap; z-index:5;`;
                p.innerText = o.t; p.onclick = () => check(o.ok, p); st.appendChild(p);
            });
        }
        else {
            it.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t;
                b.onclick = () => check(o.ok, b); op.appendChild(b);
            });
        }
    }

    function check(ok, el) {
        if(ok === true || ok === "true") { 
            score += 100; document.getElementById('score-val').innerText = score + " ⭐";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            cur++; setTimeout(() => { if(cur < qs.length) render(); else finish(); }, 600);
        } else { 
            if(el) { el.style.background = 'var(--red)'; setTimeout(() => el.style.background='', 400); }
        }
    }

    function updateP() { const p = document.getElementById('player'); if(p){p.style.left=px+'px'; p.style.top=py+'px';} }
    
    function initJoy() {
        const j = document.getElementById('joy'), s = document.getElementById('stick');
        j.ontouchmove = (e) => {
            let t = e.touches[0], r = j.getBoundingClientRect(), x = t.clientX-r.left-55, y = t.clientY-r.top-55;
            let ang = Math.atan2(y,x), d = Math.min(Math.sqrt(x*x+y*y),40);
            s.style.transform = `translate(${Math.cos(ang)*d}px,${Math.sin(ang)*d}px)`;
            px += Math.cos(ang)*10; py += Math.sin(ang)*10; updateP();
            document.querySelectorAll('.target').forEach(m => {
                let r1 = document.getElementById('player').getBoundingClientRect(), r2 = m.getBoundingClientRect();
                if(!(r1.right<r2.left||r1.left>r2.right||r1.bottom<r2.top||r1.top>r2.bottom)) check(m.dataset.ok, m);
            });
        };
    }

    function finish() {
        confetti({ particleCount: 500, spread: 160 });
        document.getElementById('q-text').innerText = "ПОБЕДА!";
        document.getElementById('stage').innerHTML = `<div style="text-align:center; padding-top:100px;"><h1>УРА! 🎉</h1><h2>Твой счёт: ${score}</h2><button class="btn btn-ai" onclick="location.reload()">В МЕНЮ</button></div>`;
        document.getElementById('options').innerHTML = "";
    }

    function exportCode() {
        saveQs(); if(!qs.length) { alert("Добавь вопросы!"); return; }
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({m: mode, q: qs}))));
        navigator.clipboard.writeText(code).then(() => alert("Код игры скопирован!"));
    }

    function importGame() {
        const code = prompt("Вставь код игры:"); if(!code) return;
        try {
            const dec = JSON.parse(decodeURIComponent(escape(atob(code))));
            mode = dec.m; qs = dec.q; cur = 0; score = 0; show('sc-game'); render();
        } catch(e) { alert("Неверный код!"); }
    }

    function startPlay() { saveQs(); if(qs.length) { cur = 0; score = 0; show('sc-game'); render(); } else { alert("Добавь вопросы!"); } }
</script>
</body>
</html>
