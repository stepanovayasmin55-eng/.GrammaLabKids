<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Kids</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #00a2ff; --bg: #f0f4f8; --ai: #6c5ce7; --s: #2ecc71; --red: #ff4757; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); touch-action: manipulation; user-select: none; overflow-x: hidden; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        
        .btn { padding: 18px; border-radius: 22px; border: none; font-weight: 900; cursor: pointer; width: 100%; margin: 8px 0; font-size: 17px; color: white; text-transform: uppercase; transition: 0.2s; position: relative; }
        .btn-p { background: var(--p); box-shadow: 0 6px 0 #0081cc; }
        .btn-ai { background: var(--ai); box-shadow: 0 6px 0 #5649c0; }
        .btn-s { background: var(--s); box-shadow: 0 6px 0 #219150; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 20px; border-radius: 25px; text-align: center; border: 2px solid #e2e8f0; cursor: pointer; transition: 0.3s; }

        #stage { background: white; border-radius: 35px; height: 350px; position: relative; border: 6px solid var(--p); overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Анимации */
        .mole { width: 90px; height: 110px; background: #8d6e63; border-radius: 30px 30px 10px 10px; position: absolute; bottom: -130px; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: white; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 11px; border: 3px solid #5d4037; }
        .mole.up { bottom: 30px; }

        .plane-item { position: absolute; background: white; border: 3px solid var(--p); padding: 12px; border-radius: 18px; left: 110%; animation: fly linear infinite; font-weight: bold; box-shadow: 0 5px 0 #ddd; cursor: pointer; }
        
        .letter-btn { background: white; border: 3px solid var(--ai); color: var(--ai); padding: 12px; border-radius: 12px; font-size: 20px; font-weight: 900; animation: bounce 0.5s ease-in-out; }
        
        .sort-card { background: white; border: 4px solid var(--ai); padding: 20px; border-radius: 20px; font-size: 20px; font-weight: bold; animation: drop 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        @keyframes fly { from { left: 110%; } to { left: -180px; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes drop { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--p); font-size: 22px;">GrammaLab Kids</div>
    <div id="score-val" style="font-weight:900; font-size: 20px;">0 ⭐</div>
    <button onclick="location.reload()" style="background:none; border:none; font-size:28px; cursor:pointer;">🏠</button>
</header>

<div id="sc-menu" class="screen active">
    <div class="grid" id="menu-box"></div>
    <button class="btn btn-s" style="margin-top:20px;" onclick="importGame()">📥 ЗАГРУЗИТЬ ИГРУ</button>
</div>

<div id="sc-edit" class="screen">
    <div class="card" style="margin-bottom:10px; cursor:default;">
        <b style="color:var(--ai)">🤖 ВЫБЕРИ ТЕМУ ИИ (13):</b>
        <div id="ai-topics" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-top:10px;"></div>
    </div>
    <div id="factory"></div>
    <button class="btn" style="background:#636e72" onclick="addQ()">➕ СВОЙ ВОПРОС</button>
    <div class="grid">
        <button class="btn btn-s" onclick="exportCode()">📤 КОД</button>
        <button class="btn btn-p" onclick="startPlay()">ИГРАТЬ ▶️</button>
    </div>
</div>

<div id="sc-game" class="screen">
    <div id="q-text" style="font-size:20px; font-weight:900; text-align:center; margin-bottom:10px; min-height:45px;"></div>
    <div id="stage"></div>
    <div id="options" class="grid"></div>
</div>

<script>
    const modes = [
        {id:'mole', n:'Кроты', e:'🔨'}, {id:'plane', n:'Самолет', e:'✈️'}, 
        {id:'words', n:'Слова', e:'🔠'}, {id:'tf', n:'Да/Нет', e:'✔️'}, 
        {id:'sort', n:'Группы', e:'↔️'}, {id:'quiz', n:'Тест', e:'📝'}
    ];

    const aiData = [
        {t:"Сущ.", q:"Найди сущ. 3-го склонения:", a:["Ночь", "Конь", "Окно"]},
        {t:"Глагол", q:"Глагол в инфинитиве:", a:["Бежать", "Бегу", "Бегал"]},
        {t:"Прилаг.", q:"Лишнее слово:", a:["Бег", "Белый", "Синий"]},
        {t:"Местоим.", q:"Личное местоимение:", a:["Они", "Свой", "Этот"]},
        {t:"Наречие", q:"Вопрос 'Где?':", a:["Там", "Тихо", "Быстро"]},
        {t:"Предлог", q:"Найди предлог:", a:["Через", "И", "Но"]},
        {t:"Союз", q:"Разделительный союз:", a:["Или", "И", "Что"]},
        {t:"Числит.", q:"Порядковое:", a:["Пятый", "Пять", "Пятерка"]},
        {t:"Обращ.", q:"Как выделяем?", a:["Запятыми", "Тире", "Никак"]},
        {t:"Корень", q:"Главная часть слова:", a:["Корень", "Суффикс", "Оконч."]},
        {t:"Звуки", q:"Звук [Ш] всегда:", a:["Твердый", "Мягкий", "Гласный"]},
        {t:"Синтакс.", q:"Подлежащее отвечает на:", a:["Кто? Что?", "Как?", "Где?"]},
        {t:"Лексика", q:"Антоним к 'День':", a:["Ночь", "Утро", "Свет"]}
    ];

    let mode='', qs=[], cur=0, score=0;

    modes.forEach(m => {
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<span style="font-size:30px">${m.e}</span><br><b>${m.n}</b>`;
        d.onclick = () => { mode = m.id; show('sc-edit'); initEdit(); };
        document.getElementById('menu-box').appendChild(d);
    });

    function initEdit() {
        const box = document.getElementById('ai-topics'); box.innerHTML = '';
        aiData.forEach(d => {
            const b = document.createElement('button');
            b.style="background:var(--ai); color:white; border:none; padding:8px 2px; border-radius:8px; font-size:10px; font-weight:bold; cursor:pointer;";
            b.innerText = d.t; b.onclick = () => addQ(d.q, d.a, 0); box.appendChild(b);
        });
    }

    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function addQ(q='', a=['','',''], c=0) {
        const d = document.createElement('div'); d.className = 'card'; d.style='margin-bottom:12px; text-align:left; padding:15px; border-left:8px solid var(--ai)';
        const rid = Math.random().toString(36).substr(2,5);
        d.innerHTML = `<input type="text" placeholder="Вопрос..." value="${q}" class="qi" style="width:100%; padding:10px; margin-bottom:8px; border-radius:10px; border:1px solid #ddd;">
            ${[0,1,2].map(i => `<div style="display:flex; align-items:center; gap:8px; margin-bottom:5px;">
                <input type="radio" name="${rid}" ${i===c?'checked':''} class="ok-check">
                <input type="text" placeholder="Ответ" value="${a[i]||''}" class="ai" style="width:100%; padding:8px; border-radius:8px; border:1px solid #eee;">
            </div>`).join('')}`;
        document.getElementById('factory').appendChild(d);
    }

    function saveQs() {
        qs = [];
        document.querySelectorAll('#factory > .card').forEach(c => {
            const opts = [];
            c.querySelectorAll('div[style*="flex"]').forEach(d => {
                const t = d.querySelector('.ai').value;
                if(t) opts.push({t, ok: d.querySelector('.ok-check').checked});
            });
            if(c.querySelector('.qi').value) qs.push({q: c.querySelector('.qi').value, opts});
        });
    }

    function render() {
        const it = qs[cur]; const st = document.getElementById('stage'); const op = document.getElementById('options');
        st.innerHTML = ""; op.innerHTML = ""; document.getElementById('q-text').innerText = it.q;

        if(mode === 'mole') {
            it.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15 + i*110) + 'px'; m.onclick = () => check(o.ok, m);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 100 + i*300);
            });
        } 
        else if(mode === 'plane') {
            it.opts.forEach((o, i) => {
                const p = document.createElement('div'); p.className = 'plane-item';
                p.style.top = (30+i*90)+'px'; p.style.animationDuration = (4+i)+'s';
                p.innerText = o.t; p.onclick = () => check(o.ok, p); st.appendChild(p);
            });
        }
        else if(mode === 'words') {
            const correct = it.opts.find(o => o.ok).t;
            const letters = correct.split('').sort(() => Math.random()-0.5);
            op.style.display='flex'; op.style.flexWrap='wrap'; op.style.justifyContent='center'; op.style.gap='8px';
            letters.forEach(l => {
                const b = document.createElement('button'); b.className = 'letter-btn'; b.innerText = l;
                b.onclick = () => { b.style.opacity='0.3'; b.disabled=true; }; op.appendChild(b);
            });
            const fb = document.createElement('button'); fb.className='btn btn-s'; fb.innerText="ГОТОВО"; fb.style.width='100%'; fb.onclick=()=>check(true); op.appendChild(fb);
        }
        else if(mode === 'tf') {
            const b1 = document.createElement('button'); b1.className='btn btn-s'; b1.innerText="ПРАВДА"; b1.onclick=()=>check(it.opts[0].ok);
            const b2 = document.createElement('button'); b2.className='btn btn-p'; b2.style.background='var(--red)'; b2.innerText="ЛОЖЬ"; b2.onclick=()=>check(!it.opts[0].ok);
            op.appendChild(b1); op.appendChild(b2);
        }
        else if(mode === 'sort') {
            const c = document.createElement('div'); c.className = 'sort-card'; c.innerText = it.opts[0].t; st.appendChild(c);
            const b1 = document.createElement('button'); b1.className='btn btn-p'; b1.innerText="ГРУППА А"; b1.onclick=()=>check(true);
            const b2 = document.createElement('button'); b2.className='btn btn-ai'; b2.innerText="ГРУППА Б"; b2.onclick=()=>check(false);
            op.appendChild(b1); op.appendChild(b2);
        }
        else { // QUIZ
            it.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t;
                b.onclick = () => check(o.ok, b); op.appendChild(b);
            });
        }
    }

    function check(ok, el) {
        if(ok === true || ok === "true") { 
            score += 10; document.getElementById('score-val').innerText = score + " ⭐";
            confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
            cur++; setTimeout(() => { if(cur < qs.length) render(); else finish(); }, 500);
        } else if(el) { el.style.background = 'var(--red)'; setTimeout(() => el.style.background='', 400); }
    }

    function finish() {
        confetti({ particleCount: 100, spread: 70 });
        document.getElementById('stage').innerHTML = `<h1 style="color:var(--p)">ФИНАЛ! 🎉</h1><h2>Счет: ${score} ⭐</h2><button class="btn btn-s" onclick="location.reload()">В МЕНЮ</button>`;
        document.getElementById('q-text').innerText = "";
    }

    function exportCode() {
        saveQs(); if(!qs.length) return;
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({m: mode, q: qs}))));
        navigator.clipboard.writeText(code).then(() => alert("Код скопирован!"));
    }

    function importGame() {
        const code = prompt("Вставь код:"); if(!code) return;
        try {
            const dec = JSON.parse(decodeURIComponent(escape(atob(code))));
            mode = dec.m; qs = dec.q; cur = 0; score = 0; show('sc-game'); render();
        } catch(e) { alert("Ошибка!"); }
    }

    function startPlay() { saveQs(); if(qs.length) { cur = 0; score = 0; show('sc-game'); render(); } }
</script>
</body>
</html>
