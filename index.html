<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>GrammaLab Kids | Pro</title>
    <style>
        :root{--p:#00a2ff;--bg:#0f172a;--ai:#8b5cf6;--s:#10b981;--red:#ef4444;--gold:#f59e0b;--card:#1e293b}
        body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff;user-select:none;touch-action:manipulation}
        header{background:#1e293b;padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--p);position:sticky;top:0;z-index:100}
        .screen{display:none;padding:15px;max-width:500px;margin:0 auto}
        .active{display:block}
        .btn{padding:16px;border-radius:18px;border:none;font-weight:900;cursor:pointer;width:100%;margin:8px 0;color:#fff;text-transform:uppercase;transition:.2s}
        .btn-p{background:var(--p);box-shadow:0 5px 0 #0369a1}
        .btn-ai{background:var(--ai);box-shadow:0 5px 0 #6d28d9}
        .btn-s{background:var(--s);box-shadow:0 5px 0 #047857}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .card{background:var(--card);padding:15px;border-radius:20px;text-align:center;border:1px solid #334155}
        #stage{background:#fff;border-radius:30px;height:300px;position:relative;border:5px solid var(--ai);overflow:hidden;margin-bottom:15px;display:flex;align-items:center;justify-content:center}
        .mole{width:80px;height:95px;background:#78350f;border-radius:25px 25px 5px 5px;position:absolute;bottom:-110px;transition:.3s;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:3px solid #451a03;text-align:center}
        .mole.up{bottom:35px}
        .plane{position:absolute;background:var(--p);padding:10px;border-radius:15px;left:110%;animation:fly linear infinite;font-weight:900}
        .badge{background:#334155;color:#fff;border:1px solid var(--ai);padding:12px 4px;border-radius:15px;font-size:10px;font-weight:700;position:relative;cursor:pointer}
        .count{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#000;border-radius:10px;padding:2px 5px;font-size:9px}
        @keyframes fly{from{left:110%}to{left:-500px}}
    </style>
</head>
<body>

<header>
    <div style="font-weight:900;color:var(--p)">GrammaLab Kids</div>
    <div id="st">0 ⭐ | <span id="hp" style="color:var(--red)">❤️❤️❤️</span></div>
</header>

<div id="sc-menu" class="screen active">
    <div class="grid" id="menu-grid"></div>
</div>

<div id="sc-edit" class="screen">
    <div class="card" style="background:var(--ai);margin-bottom:15px;border:none">
        <b style="font-size:12px">КЛИКАЙ ТЕМЫ ДЛЯ СБОРКИ ИГРЫ:</b>
        <div id="topic-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px"></div>
    </div>
    <div id="factory" style="max-height:150px;overflow-y:auto;margin-bottom:10px"></div>
    <button class="btn btn-s" onclick="startGame()">ИГРАТЬ ▶️</button>
    <button class="btn btn-ai" onclick="shareGame()">🔗 ПЕРЕДАТЬ МОЮ ИГРУ</button>
</div>

<div id="sc-game" class="screen">
    <div id="question-text" style="font-size:17px;font-weight:900;text-align:center;margin-bottom:12px;color:var(--p)"></div>
    <div id="stage"></div>
    <div id="options-grid" class="grid"></div>
</div>

<script>
const modes=[{id:'mole',n:'Кроты',e:'🔨'},{id:'plane',n:'Самолет',e:'✈️'},{id:'words',n:'Слова',e:'🔠'},{id:'tf',n:'П/Л',e:'⚖️'},{id:'sort',n:'Группы',e:'↔️'},{id:'quiz',n:'Тест',e:'📝'}];
const aiData={
    "1. Сущ.": [{q:"Род 'Тюль'?",a:["М.р.","Ж.р."]},{q:"Только ед.ч.?",a:["Золото","Брюки"]}],
    "2. Обращ.": [{q:"Знаки в 'Мам пой'?",a:["Мам, пой!","Мам пой"]}],
    "3. Речь": [{q:"Много глаголов в:",a:["Повеств.","Описании"]}],
    "4. Лексика": [{q:"Синоним 'Вдруг':",a:["Внезапно","Тихо"]}],
    "5. Однород.": [{q:"Перед 'А':",a:[", всегда","нет"]}],
    "6. Обобщающие": [{q:"Знак после ОС:",a:[":","—"]}],
    "7. Пр. Речь": [{q:"Автор ПЕРЕД:",a:["А: 'П.'","'П',-а"]}],
    "8. Подлеж.": [{q:"Вопрос:",a:["Кто? Что?","Где?"]}],
    "9. Сказуемое": [{q:"Линии:",a:["==","__"]}],
    "10. Втор.чл.": [{q:"Определение:",a:["Какой?","Где?"]}],
    "11. Тире П-С": [{q:"'Он ученик' — нужно?",a:["Нет","Да"]}],
    "12. Местоим.": [{q:"2 лицо мн.ч.:",a:["Вы","Мы"]}],
    "13. Глагол": [{q:"Исключение:",a:["Видеть","Брить"]}]
};

// Заполняем темы до 10 вопросов
Object.keys(aiData).forEach(t=>{while(aiData[t].length<10)aiData[t].push({q:t+" вопрос "+(aiData[t].length+1),a:["Да","Нет"]})});

let currentMode='', questions=[], curIdx=0, score=0, lives=3, lock=false, prog={};

modes.forEach(m=>{
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div style="font-size:35px">${m.e}</div><b>${m.n}</b>`;
    d.onclick=()=>{currentMode=m.id;showScreen('sc-edit');initEditor()};
    document.getElementById('menu-grid').appendChild(d);
});

function initEditor(){
    const g=document.getElementById('topic-grid');g.innerHTML='';
    Object.keys(aiData).forEach(t=>{
        prog[t]=0; const b=document.createElement('button');b.className='badge';
        b.innerHTML=`${t} <span class="count">0/10</span>`;
        b.onclick=()=>{if(prog[t]<10){addQ(t,aiData[t][prog[t]]);prog[t]++;b.querySelector('.count').innerText=prog[t]+'/10'}};
        g.appendChild(b);
    });
    // ПРОВЕРКА: Если пришли по ссылке
    const params = new URLSearchParams(window.location.search);
    if(params.has('data')) {
        alert("Загружена игра от друга!");
        questions = JSON.parse(atob(params.get('data')));
        startGame();
    }
}

function addQ(t,d){
    const f=document.getElementById('factory');const div=document.createElement('div');
    div.style.cssText="background:#334155;padding:5px;margin:3px;border-radius:8px;font-size:10px";
    div.innerHTML=`<b>${t}:</b> ${d.q} <input type="hidden" class="data-q" value='${JSON.stringify({q:d.q,opts:[{t:d.a[0],ok:1},{t:d.a[1],ok:0}].sort(()=>Math.random()-.5)})'>`;
    f.prepend(div);
}

function startGame(){
    if(!questions.length) {
        document.querySelectorAll('#factory div').forEach(c=>questions.push(JSON.parse(c.querySelector('.data-q').value)));
    }
    if(questions.length){curIdx=0;score=0;lives=3;showScreen('sc-game');renderQ()}
}

function shareGame(){
    const sharedData = [];
    document.querySelectorAll('#factory div').forEach(c=>sharedData.push(JSON.parse(c.querySelector('.data-q').value)));
    const base64 = btoa(JSON.stringify(sharedData));
    const link = window.location.origin + window.location.pathname + "?data=" + base64;
    navigator.clipboard.writeText(link);
    alert("Ссылка скопирована! Отправь её другу.");
}

function renderQ(){
    lock=false; const it=questions[curIdx]; const st=document.getElementById('stage');
    document.getElementById('question-text').innerText=it.q;
    document.getElementById('st').innerHTML=`${score} ⭐ | <span style="color:var(--red)">${'❤️'.repeat(lives)}</span>`;
    st.innerHTML=""; document.getElementById('options-grid').innerHTML="";
    
    if(currentMode==='mole'){
        it.opts.forEach((v,i)=>{
            const m=document.createElement('div');m.className='mole';m.innerText=v.t;
            m.style.left=(20+i*150)+'px';m.onclick=()=>check(v.ok,m);st.appendChild(m);
            setTimeout(()=>m.classList.add('up'),100);
        });
    } else {
        it.opts.forEach(v=>{
            const b=document.createElement('button');b.className='btn btn-p';b.innerText=v.t;
            b.onclick=()=>check(v.ok,b);document.getElementById('options-grid').appendChild(b);
        });
    }
}

function check(ok,el){
    if(lock)return; lock=true;
    if(ok){score+=10; if(el)el.style.background='var(--s)'}
    else{lives--; if(el)el.style.background='var(--red)'}
    if(lives<=0){alert("Игра окончена!");location.reload();return}
    curIdx++;
    setTimeout(()=>{if(curIdx<questions.length)renderQ();else alert("Победа! Счет: "+score)},600);
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
</script>
</body>
</html>
