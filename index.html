<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Kids | All Games</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #00a2ff; --bg: #f0f4f8; --ai: #6c5ce7; --s: #2ecc71; --red: #ff4757; --gold: #f1c40f; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); touch-action: manipulation; user-select: none; overflow-x: hidden; color: #2d3436; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .screen { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: slideIn 0.3s ease-out; }
        .active { display: block; }
        .btn { padding: 18px; border-radius: 22px; border: none; font-weight: 900; cursor: pointer; width: 100%; margin: 8px 0; font-size: 17px; color: white; text-transform: uppercase; transition: 0.2s; position: relative; }
        .btn-p { background: var(--p); box-shadow: 0 6px 0 #0081cc; }
        .btn-ai { background: var(--ai); box-shadow: 0 6px 0 #5649c0; }
        .btn-s { background: var(--s); box-shadow: 0 6px 0 #219150; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; padding: 15px; border-radius: 25px; text-align: center; border: 2px solid #e2e8f0; position: relative; }
        #factory .card { margin-bottom: 10px; text-align: left; border-left: 6px solid var(--ai); animation: drop 0.3s ease; }
        #stage { background: white; border-radius: 35px; height: 320px; position: relative; border: 6px solid var(--p); overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .mole { width: 90px; height: 110px; background: #8d6e63; border-radius: 30px 30px 10px 10px; position: absolute; bottom: -130px; transition: 0.4s; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; border: 4px solid #5d4037; text-align: center; padding: 5px; cursor: pointer; }
        .mole.up { bottom: 40px; }
        .plane-item { position: absolute; background: white; border: 3px solid var(--p); padding: 10px 15px; border-radius: 20px; left: 110%; animation: fly linear infinite; font-weight: 900; color: var(--p); white-space: nowrap; cursor: pointer; }
        .ai-badge { background: var(--ai); color: white; border: none; padding: 12px 5px; border-radius: 15px; font-size: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #4839a9; position: relative; }
        .badge-count { position: absolute; top: -5px; right: -5px; background: var(--gold); color: black; border-radius: 10px; padding: 2px 6px; font-size: 10px; border: 2px solid white; font-weight: 900; }
        @keyframes fly { from { left: 110%; } to { left: -500px; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes drop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; color:var(--p); font-size: 18px;">GrammaLab Kids</div>
    <div id="score-val" style="font-weight:900; font-size: 16px; color: var(--gold);">0 ⭐</div>
    <button onclick="location.reload()" style="background:none; border:none; font-size:24px;">🏠</button>
</header>

<div id="sc-menu" class="screen active">
    <div class="grid" id="menu-box"></div>
</div>

<div id="sc-edit" class="screen">
    <div class="card" style="margin-bottom:15px; background: #f4f4ff;">
        <b style="color:var(--ai);">ДОБАВЬ ВОПРОСЫ (ПО 10 НА ТЕМУ):</b>
        <div id="ai-topics" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px;"></div>
    </div>
    <div id="factory"></div>
    <button class="btn btn-p" onclick="startPlay()">ИГРАТЬ ▶️</button>
</div>

<div id="sc-game" class="screen">
    <div id="q-text" style="font-size:17px; font-weight:900; text-align:center; margin-bottom:15px; color: var(--ai); min-height: 50px;"></div>
    <div id="stage"></div>
    <div id="options" class="grid"></div>
</div>

            {q:"Подчеркиваем:", a:["1 чертой", "2 чертами", "Волной"]},
            {q:"Выражено обычно:", a:["Существительным", "Глаголом", "Наречием"]},
            {q:"Главный член?", a:["Да", "Нет", "Иногда"]},
            {q:"'Кот спит':", a:["Кот", "Спит", "Нет"]},
            {q:"Падеж П:", a:["Именительный", "Дательный", "Винительный"]},
            {q:"Может быть 'Я'?", a:["Да", "Нет", "Никогда"]},
            {q:"Найди П:", a:["Мама пришла", "Пришла", "Домой"]},

        ],

            {q:"Их всего:", a:["Три типа", "Два типа", "Один"]}
        ],
        "11. Тире П-С": [
            {q:"Нужно тире:", a:["Астана — город.", "Я ученик.", "Он добрый."]},
            {q:"Сущ — Сущ:", a:["Ставим тире", "Запятую", "Ничего"]},
            {q:"Перед 'ЭТО':", a:["Ставим тире", "Запятую", "Точка"]},
            {q:"Я ученик. Тире?", a:["Не нужно", "Нужно", "Всегда"]},
            {q:"Она врач. Тире?", a:["Не нужно", "Нужно", "Иногда"]},
            {q:"Книга — друг.", a:["Тире верно", "Ложно", "Ошибка"]},

        "12. Местоим.": [

            {q:"Будущее:", a:["Увижу", "Видел", "Вижу"]},
            {q:"Обозначает:", a:["Действие", "Предмет", "Признак"]},

    let mode='', qs=[], cur=0, score=0, lock=false;
    let topicProgress = {};

    modes.forEach(m => {
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<span style="font-size:38px">${m.e}</span><br><b>${m.n}</b>`;
        d.onclick = () => { mode = m.id; show('sc-edit'); initEditor(); };
        document.getElementById('menu-box').appendChild(d);
    });

    function initEditor() {
        const box = document.getElementById('ai-topics'); box.innerHTML = '';
        Object.keys(aiKnowledge).forEach(topic => {
            topicProgress[topic] = 0;
            const b = document.createElement('button'); b.className = 'ai-badge';
            b.innerHTML = `${topic} <span class="badge-count">0/10</span>`;
            b.onclick = () => {
                if(topicProgress[topic] < 10) {
                    const data = aiKnowledge[topic][topicProgress[topic]];
                    addQCard(topic, data.q, data.a);
                    topicProgress[topic]++;
                    b.querySelector('.badge-count').innerText = `${topicProgress[topic]}/10`;
                    if(topicProgress[topic] === 10) b.style.background = 'var(--s)';
                }
            };
            box.appendChild(b);
        });
    }

    function addQCard(topic, q, a) {
        const f = document.getElementById('factory');
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = `<button style="position:absolute;right:5px;top:5px;border:none;background:var(--red);color:white;border-radius:50%;width:20px;height:20px;" onclick="this.parentElement.remove()">×</button>
            <div style="font-size:10px; color:var(--ai);">${topic}</div>
            <div style="font-size:12px; font-weight:bold;">${q}</div>
            <input type="hidden" class="qi" value="${q}">
            <input type="hidden" class="ai-ok" value="${a[0]}">
            <input type="hidden" class="ai-w1" value="${a[1]}">
            <input type="hidden" class="ai-w2" value="${a[2]}">`;
        f.prepend(d);
    }

    function startPlay() {
        qs = [];
        document.querySelectorAll('#factory .card').forEach(c => {
            const q = c.querySelector('.qi').value;
            const ok = c.querySelector('.ai-ok').value;
            const w1 = c.querySelector('.ai-w1').value;
            const w2 = c.querySelector('.ai-w2').value;
            qs.push({ q: q, opts: [{t: ok, ok: true}, {t: w1, ok: false}, {t: w2, ok: false}].sort(() => Math.random() - 0.5) });
        });
        if(qs.length) { cur = 0; score = 0; show('sc-game'); render(); }
    }

    function render() {
        lock = false; const it = qs[cur]; const st = document.getElementById('stage'); const op = document.getElementById('options');
        st.innerHTML = ""; op.innerHTML = ""; document.getElementById('q-text').innerText = it.q;
        document.getElementById('score-val').innerText = `${score} ⭐`;

        if(mode === 'mole') {
            it.opts.forEach((o, i) => {
                const m = document.createElement('div'); m.className = 'mole'; m.innerText = o.t;
                m.style.left = (15 + i*115) + 'px'; m.onclick = () => check(o.ok, m);
                st.appendChild(m); setTimeout(() => m.classList.add('up'), 100 + i*400);
            });
        } else if(mode === 'plane') {
            it.opts.forEach((o, i) => {
                const p = document.createElement('div'); p.className = 'plane-item';
                p.style.top = (40 + i*90) + 'px'; p.style.animationDuration = (7 + i*2) + 's';
                p.innerText = o.t; p.onclick = () => check(o.ok, p); st.appendChild(p);
            });
        } else if(mode === 'words') {
            st.innerHTML = `<div style="font-size:24px; color:var(--p); font-weight:900;">Собери ответ: <br>${it.opts.find(x => x.ok).t.split('').sort(()=>Math.random()-0.5).join(' ')}</div>`;
            it.opts.forEach(o => { const b = document.createElement('button'); b.className='btn btn-p'; b.innerText=o.t; b.onclick=()=>check(o.ok, b); op.appendChild(b); });
        } else if(mode === 'tf' || mode === 'sort') {
            st.innerHTML = `<div class="card" style="font-size:20px; border:4px solid var(--ai); padding:20px;">${it.q}<br><br><b style="color:var(--s)">${it.opts[0].t}</b></div>`;
            const b1 = document.createElement('button'); b1.className='btn btn-s'; b1.innerText="ВЕРНО"; b1.onclick=()=>check(it.opts[0].ok, b1);
            const b2 = document.createElement('button'); b2.className='btn btn-p'; b2.style.background='var(--red)'; b2.innerText="ЛОЖЬ"; b2.onclick=()=>check(!it.opts[0].ok, b2);
            op.appendChild(b1); op.appendChild(b2);
        } else {
            it.opts.forEach(o => { const b = document.createElement('button'); b.className = 'btn btn-p'; b.innerText = o.t; b.onclick = () => check(o.ok, b); op.appendChild(b); });
        }
    }

    function check(ok, el) {
        if(lock) return; lock = true;
        if(ok) { score += 10; confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } }); }
        else if(el) { el.style.background = 'var(--red)'; }
        cur++; setTimeout(() => { if(cur < qs.length) render(); else finish(); }, 700);
    }

    function finish() {
        document.getElementById('stage').innerHTML = `<div style="text-align:center"><h2>🏆 КОНЕЦ!</h2><h3>Счет: ${score}</h3><button class="btn btn-s" onclick="location.reload()">МЕНЮ</button></div>`;
    }

    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
